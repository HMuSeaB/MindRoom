<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mind Room</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div data-tauri-drag-region class="titlebar"></div>

  <div id="app">
    <nav id="navbar">
      <button data-target="timer" class="active">Focus</button>
      <button data-target="stream">Stream</button>
      <button data-target="canvas">Canvas</button>
    </nav>

    <section id="timer" class="view-container active">
      <div class="timer-circle" id="timer-display">25:00</div>
      <p class="timer-hint">CLICK TO START / SCROLL TO SET</p>
    </section>

    <section id="stream" class="view-container stream-view">
      <textarea id="stream-input" placeholder="Type into the void..."></textarea>
      <button id="release-btn" class="release-btn" title="Release Thoughts">Release</button>
    </section>

    <section id="canvas" class="view-container canvas-view">
      <canvas id="mind-map"></canvas>
      <div class="canvas-toolbar">
        <input type="color" id="node-color" value="#88ccaa" title="Node Color">
        <button id="export-canvas-btn" title="Export Canvas">Save</button>
        <button id="clear-canvas-btn" title="Clear Canvas">Clear</button>
      </div>
    </section>
  </div>

  <script type="module" src="/main.js"></script>
</body>

</html>
