name: Build MindRoom Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend checks
        run: npm run check:frontend

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate Rust workspace
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build Tauri desktop bundles
        run: npm run build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mindroom-windows-bundles
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04
    needs: checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;27.0.12077973"

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate Rust workspace for Android targets
        run: cargo check --manifest-path src-tauri/Cargo.toml --target aarch64-linux-android

      # Build a debug APK first so CI works without repository signing secrets.
      - name: Build Tauri Android debug APK
        run: npx tauri android build --debug

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mindroom-android-artifacts
          if-no-files-found: error
          path: |
            src-tauri/gen/android/app/build/outputs/apk/universal/debug/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/universalDebug/*.aab
